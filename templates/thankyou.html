<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>
    <link rel="stylesheet" href="static/style1.css">
    <style>
        .thankyou-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            transform-style: preserve-3d;
            animation: rotateAndTilt 10s infinite alternate, infinite alternate;
        }

        .thankyou-title {
            font-size: 3em;
            color: #fff;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            transform: translateZ(50px) rotateX(10deg);
            animation: fadeInUp 1s;
        }

        .thankyou-text {
            color: #aaa;
            font-size: 1.2em;
            text-align: center;
            max-width: 600px;
            transform: translateZ(30px);
            animation: fadeIn 1s;
        }

        .back-button {
            padding: 15px 30px;
            background-color: #66b3ff;
            color: #222;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: 500;
            text-decoration: none;
            transition: background-color 0.2s, transform 0.2s;
            margin-top: 30px;
            display: inline-block;
            transform: translateZ(40px);
            animation: pulse 2s infinite alternate;
        }

        .back-button:hover {
            background-color: #fff;
            transform: scale(1.05) translateZ(40px);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="thankyou-container">
            <h1 class="thankyou-title">
                Thank You for Visiting! 🎉
            </h1>
            <p class="thankyou-text">
                We appreciate your interest in our object recognition project. 🙏 We hope you enjoyed the demonstration! ✨
            </p>
            <a href="/" class="back-button">
                Back to Home 🏠
            </a>
        </div>
    </div>
</body>

</html>
